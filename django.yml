name: Django CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Если используешь openpyxl или pytils (они есть в твоем коде) 
          # убедись, что они прописаны в requirements.txt

      - name: Run Tests
        env:
          # Здесь можно передать переменные окружения, если settings.py их требует
          DEBUG: "True"
          SECRET_KEY: "test-key-for-ci"
          DATABASE_URL: "sqlite:///:memory:"
        run: |
          python manage.py test